<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lappsus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #0d0d0d;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      border-bottom: 1px solid #e8e8e8;
      padding: 24px 40px;
    }
    .logo { font-size: 20px; font-weight: 300; letter-spacing: -0.5px; color: #000; text-decoration: none; }
    .logo::before { content: "["; }
    .logo::after { content: "]"; }
    main {
      max-width: 680px;
      margin: 60px auto;
      padding: 0 24px;
      flex: 1;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .tagline { color: #555; margin-bottom: 48px; font-size: 14px; }
    .app { margin-bottom: 40px; }
    .app h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .app p { color: #555; font-size: 13px; margin-bottom: 12px; }
    .links { display: flex; gap: 16px; }
    .links a {
      color: #ff8012;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .links a:hover { border-bottom-color: #ff8012; }
    footer {
      border-top: 1px solid #e8e8e8;
      padding: 20px 40px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <header>
    <img src="/assets/lappsus-logo.png" alt="Lappsus Software">
  </header>
  <main>
    <h1>Les nostres apps</h1>
    <p class="tagline">Apps fetes amb cura per a iPhone, iPad i Mac.</p>

    <div class="app">
      <h2>Inrium</h2>
      <p>Gestió del Tractament Anticoagulant Oral (TAO/Sintrom).</p>
      <div class="links">
        <a href="/inrium/privacy/ca">Política de privacitat</a>
        <a href="/inrium/terms/ca">Termes d'ús</a>
      </div>
    </div>
  </main>
  <footer>
    &copy; 2026 Didac Morales · Lappsus
  </footer>
</body>
</html>
